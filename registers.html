<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EGAM Registration</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    background:#f4f4f4;
}

.container{
    max-width:700px;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:10px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input,select,textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:15px;
    background:#0066cc;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#004999;
}

#message{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<h2>EGAM REGISTRATION</h2>

<form id="registerForm">

<input type="text" id="username" placeholder="Username" required>

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<input type="text" id="vocational" placeholder="Vocational Category" required>

<input type="text" id="state" placeholder="State of Origin" required>

<select id="religion" required>
<option value="">Select Religion</option>
<option>Christianity</option>
<option>Islam</option>
<option>Traditional</option>
<option>Others</option>
</select>

<select id="marital" required>
<option value="">Marital Status</option>
<option>Single</option>
<option>Married</option>
<option>Divorced</option>
<option>Widowed</option>
</select>

<input type="text" id="nextofkin" placeholder="Next Of Kin" required>

<input type="text" id="phone" placeholder="Phone Number" required>

<input type="text" id="kinphone" placeholder="Next Of Kin Phone Number" required>

<textarea id="address" placeholder="Address" required></textarea>

<label>Date Of Birth</label>
<input type="date" id="dob" required>

<label>Passport Image (Maximum 50KB)</label>
<input type="file" id="passport" accept="image/*" required>

<button type="submit">Register</button>

</form>

<div id="message"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
updateDoc,
setDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyA1tQE9cGdP7utPLWqHZjkAgySmaCv2foI",
  authDomain: "egam-ministry.firebaseapp.com",
  projectId: "egam-ministry",
  storageBucket: "egam-ministry.firebasestorage.app",
  messagingSenderId: "276171392995",
  appId: "1:276171392995:web:852e81ad481cd1cf0042d6",
  measurementId: "G-MXN0KLPJGX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const storage = getStorage(app);

const form = document.getElementById("registerForm");
const message = document.getElementById("message");

form.addEventListener("submit", async(e)=>{

    e.preventDefault();

    try{

        const username = document.getElementById("username").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const vocational = document.getElementById("vocational").value;
        const state = document.getElementById("state").value;
        const religion = document.getElementById("religion").value;
        const marital = document.getElementById("marital").value;
        const nextofkin = document.getElementById("nextofkin").value;
        const phone = document.getElementById("phone").value;
        const kinphone = document.getElementById("kinphone").value;
        const address = document.getElementById("address").value;
        const dob = document.getElementById("dob").value;

        const passport = document.getElementById("passport").files[0];

        if(passport.size > 51200){
            alert("Passport must not be more than 50KB");
            return;
        }

        message.innerHTML = "Creating account...";

        const userCredential = await createUserWithEmailAndPassword(auth,email,password);

        const user = userCredential.user;

        const counterRef = doc(db,"counters","registration");
        const counterSnap = await getDoc(counterRef);

        let currentNumber = counterSnap.data().currentNumber + 1;

        await updateDoc(counterRef,{currentNumber});

        let padded = String(currentNumber).padStart(3,'0');

        const regNumber = `egam/2026/2/${padded}`;

        const storageRef = ref(storage,`passports/${user.uid}`);

        await uploadBytes(storageRef,passport);

        const passportURL = await getDownloadURL(storageRef);

        await setDoc(doc(db,"users",user.uid),{

            registrationNumber:regNumber,
            username,
            email,
            vocational,
            state,
            religion,
            marital,
            nextofkin,
            phone,
            kinphone,
            address,
            dob,
            passportURL,
            createdAt:new Date()

        });

        message.innerHTML = "Registration Successful";

        setTimeout(()=>{
            window.location.href = "login.html";
        },2000);

    }catch(error){

        message.innerHTML = error.message;

    }

});

</script>

</body>
</html>
